name: radartui
description: A Flutter-inspired TUI framework for Dart. Build terminal UIs with declarative widgets, state management, diff-based rendering, and a rich widget library.
version: 0.0.2
repository: https://github.com/dev-hann/radartui
issue_tracker: https://github.com/dev-hann/radartui/issues
topics:
  - tui
  - terminal
  - cli
  - ui
  - framework
platforms:
  linux:
  macos:
  windows:
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  collection: ^1.17.0
  ffi: ^2.0.0
  test: ^1.31.0

dev_dependencies:
  lints: ^4.0.0
